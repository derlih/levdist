name: autofix.ci
on:
  pull_request:
    branches:
      - "main"
permissions: {}
jobs:
  lint:
    permissions:
      contents: read
    name: Code lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false
      - name: Setup PDM
        uses: pdm-project/setup-pdm@94a823180e06fcde4ad29308721954a521c96ed0 # v4
        with:
          python-version: "3.11"
          cache: true
      - name: Install deps
        run: pdm install --without benchmark
      - name: Restore prek hooks
        uses: actions/cache@v5
        with:
          path: ~/.cache/prek
          key: ${{ runner.os }}-prek-${{ hashFiles('.pre-commit-config.yaml') }}
      - name: Linter
        run: pdm lint
      - uses: autofix-ci/action@c5b2d67aa2274e7b5a18224e8171550871fc7e4a # v1.3.4
        if: always()
      - name: Type check
        run: pdm mypy
